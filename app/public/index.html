<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alice — AIML Chat</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Simple SVG favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <button id="btn-new-chat" class="btn-new-chat" title="New chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New chat
    </button>
    <button id="btn-toggle-sidebar" class="btn-icon sidebar-toggle-btn" title="Close sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 3v18"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-section-label">Recent</div>
  <nav id="chat-list" class="chat-list"></nav>

  <div class="sidebar-footer">
    <div class="bot-badge">
      <span class="bot-avatar-sm">🤖</span>
      <div>
        <div class="bot-name">Alice</div>
        <div class="bot-desc">Rosie + Free-AIML</div>
      </div>
    </div>
  </div>
</aside>

<!-- ── Mobile overlay ──────────────────────────────────────────────────── -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main" class="main">

  <!-- Top bar -->
  <header class="topbar">
    <button id="btn-open-sidebar" class="btn-icon topbar-menu-btn" title="Open sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="topbar-title" id="topbar-title">New chat</span>
    <button id="btn-delete-chat" class="btn-icon topbar-delete-btn hidden" title="Delete this chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </header>

  <!-- Welcome screen (shown when no messages) -->
  <div id="welcome" class="welcome">
    <div class="welcome-icon">🤖</div>
    <h1 class="welcome-title">Alice</h1>
    <p class="welcome-sub">An AIML chatbot — ask me anything</p>
    <div class="welcome-chips">
      <button class="chip" data-prompt="Hello! What can you do?">👋 Hello! What can you do?</button>
      <button class="chip" data-prompt="Tell me a joke">😄 Tell me a joke</button>
      <button class="chip" data-prompt="What is the capital of France?">🗺 Capital of France?</button>
      <button class="chip" data-prompt="What is the second month?">📅 Second month?</button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="messages hidden"></div>

  <!-- Input area -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea
        id="input"
        class="input-textarea"
        placeholder="Message Alice…"
        rows="1"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="btn-send" class="btn-send" disabled title="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Alice can make mistakes. This is a demo AIML chatbot.</p>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

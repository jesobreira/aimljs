<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alice — AIML Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <button id="btn-new-chat" class="btn-new-chat" title="New chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      New chat
    </button>
    <button id="btn-open-settings" class="btn-icon" title="Bot settings">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button id="btn-toggle-sidebar" class="btn-icon sidebar-toggle-btn" title="Collapse sidebar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M9 3v18"/>
      </svg>
    </button>
  </div>

  <div class="sidebar-section-label">Recent</div>
  <nav id="chat-list" class="chat-list"></nav>

  <div class="sidebar-footer">
    <div class="bot-badge">
      <span class="bot-avatar-sm">🤖</span>
      <div>
        <div class="bot-name">Alice</div>
        <div id="active-bots-label" class="bot-desc">Loading…</div>
      </div>
    </div>
  </div>
</aside>

<!-- ── Mobile overlay ──────────────────────────────────────────────────── -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<div id="main" class="main">
  <header class="topbar">
    <button id="btn-open-sidebar" class="btn-icon topbar-menu-btn" title="Open sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <button id="btn-expand-sidebar" class="btn-icon expand-sidebar-btn hidden" title="Show sidebar">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
      </svg>
    </button>
    <span class="topbar-title" id="topbar-title">New chat</span>
    <button id="btn-delete-chat" class="btn-icon topbar-delete-btn hidden" title="Delete this chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
        <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>
  </header>

  <div id="welcome" class="welcome">
    <div class="welcome-icon">🤖</div>
    <h1 class="welcome-title">Alice</h1>
    <p class="welcome-sub">An AIML chatbot — ask me anything</p>
    <div class="welcome-chips">
      <button class="chip" data-prompt="Hello! What can you do?">👋 Hello! What can you do?</button>
      <button class="chip" data-prompt="Tell me a joke">😄 Tell me a joke</button>
      <button class="chip" data-prompt="What is the capital of France?">🗺 Capital of France?</button>
      <button class="chip" data-prompt="What is the second month?">📅 Second month?</button>
    </div>
  </div>

  <div id="messages" class="messages hidden"></div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="input" class="input-textarea" placeholder="Message Alice…" rows="1" autocomplete="off" spellcheck="true"></textarea>
      <button id="btn-send" class="btn-send" disabled title="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Alice can make mistakes. This is a demo AIML chatbot.</p>
  </div>
</div>

<!-- ── Bot settings modal ───────────────────────────────────────────────── -->
<div id="settings-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="settings-title" class="modal-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-3px;margin-right:6px">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Bot settings
      </h2>
      <button id="btn-close-settings" class="btn-icon modal-close" title="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <p class="modal-desc">Choose which AIML knowledge bases Alice loads. Changes apply to the <strong>next new chat</strong>.</p>
    <div id="bot-list" class="bot-list"></div>
    <div class="modal-footer">
      <span id="modal-total" class="modal-total"></span>
      <button id="btn-settings-cancel" class="btn btn-ghost">Cancel</button>
      <button id="btn-settings-apply" class="btn btn-primary">Apply &amp; New Chat</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
